<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tarot Tableau</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="images/naim.png" type="image/png">
</head>
<body>
  <div class="back-btn"><button onclick="location.href='index.html'"><img src="images/back.png" alt="Back"></button></div>
  <h1 class="title">Tableau des Scores</h1>
  <form id="todo-form">
    <input type="text" id="todo-input" placeholder="Ajouter un joueur" required>
    <button id="add">+</button>
  </form>
  <table id="myTable">
    <colgroup>
      <col class="col-name">
      <col class="col-score">
      <col class="col-parties">
      <col class="col-delete">
    </colgroup>
    <thead>
      <tr><th>Nom</th><th>Score</th><th>Parties</th><th>Supprimer</th></tr>
    </thead>
    <tbody></tbody>
  </table>
  <div class="crown" id="crownLead"><img src="images/crown.webp" alt="Crown" width="35" height="35"></div>
  <script type="module" src="script.js"></script>
  <script type="module" src="score.js"></script>
</body>
</html>
